name: Dependency-Check

on:
  push:
    branches: [main]
  schedule:
    # Weekly Tuesday 09:30 ET (13:30 UTC). Offset from CodeQL's Monday cron so
    # a slow NVD API morning doesn't pile both onto the same hour.
    - cron: '30 13 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-

      # Populate ~/.m2 + module target/ so the dependency-check CLI can
      # walk the resolved dependency graph from on-disk JARs.
      - name: Resolve dependency graph
        run: |
          mvn -B -ntp -DskipTests \
            -Dspotless.check.skip=true \
            -Dlicense.skip=true \
            install

      # Action wrapper runs in a Docker image that ships with a pre-warmed
      # NVD dataset, so cold runs only fetch the daily delta — no multi-hour
      # cold-cache download like the Maven plugin path. OssIndex and the
      # JS-ecosystem analyzers are disabled: OssIndex requires a Sonatype
      # auth token since Sep 2025, and the JS analyzers have nothing to scan
      # in a Java-only repo.
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'magika-java'
          path: '.'
          format: 'HTML'
          out: 'target'
          args: >
            --format SARIF
            --failOnCVSS 7
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --disableNodeJS
            --disableNodeAudit
            --disableYarnAudit
            --disablePnpmAudit
            --disableRetireJs
            --disableOssIndex

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: target/dependency-check-report.sarif
          category: dependency-check

      - name: Upload HTML/SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: |
            **/target/dependency-check-report.html
            **/target/dependency-check-report.sarif
          if-no-files-found: ignore
          retention-days: 14
